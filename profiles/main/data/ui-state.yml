  sesCodebase\":[],\"useWeb\":[]},\"type\":\"user\",\"id\":\"c7ca8499-3ebc-4029\
  -a1bd-703b0bbee073\",\"messageType\":2,\"dropdownAdvancedCodebaseSearchBehavi\
  or\":\"embeddings\",\"followup\":false,\"text\":\"Como adicionar um alerta no
  graphana que verifique uma rota http a cada 5 m e veja o status
  code\",\"richText\":\"{\\\"root\\\":{\\\"children\\\":[{\\\"children\\\":[{\\\
  \"detail\\\":0,\\\"format\\\":0,\\\"mode\\\":\\\"normal\\\",\\\"style\\\":\\\"\
  \\\",\\\"text\\\":\\\"Como adicionar um alerta no graphana que verifique uma
  rota http a cada 5 m e veja o status
  code\\\",\\\"type\\\":\\\"text\\\",\\\"version\\\":1}],\\\"direction\\\":\\\"\
  ltr\\\",\\\"format\\\":\\\"\\\",\\\"indent\\\":0,\\\"type\\\":\\\"paragraph\\\
  \",\\\"version\\\":1}],\\\"direction\\\":\\\"ltr\\\",\\\"format\\\":\\\"\\\",\
  \\\"indent\\\":0,\\\"type\\\":\\\"root\\\",\\\"version\\\":1}}\",\"isFocused\
  \":false,\"initText\":\"{\\\"root\\\":{\\\"children\\\":[{\\\"children\\\":[{\
  \\\"detail\\\":0,\\\"format\\\":0,\\\"mode\\\":\\\"normal\\\",\\\"style\\\":\\\
  \"\\\",\\\"text\\\":\\\"Como adicionar um alerta no graphana que verifique uma
  rota http a cada 5 m e veja o status
  code\\\",\\\"type\\\":\\\"text\\\",\\\"version\\\":1}],\\\"direction\\\":\\\"\
  ltr\\\",\\\"format\\\":\\\"\\\",\\\"indent\\\":0,\\\"type\\\":\\\"paragraph\\\
  \",\\\"version\\\":1}],\\\"direction\\\":\\\"ltr\\\",\\\"format\\\":\\\"\\\",\
  \\\"indent\\\":0,\\\"type\\\":\\\"root\\\",\\\"version\\\":1}}\"},{\"type\":\
  \"ai\",\"messageType\":3,\"id\":\"b5d4c0e5-6d16-4e79-99d5-a8b96b7c71f7\",\"te\
  xt\":\"Para adicionar um alerta no Grafana que verifica uma rota HTTP a cada 5
  minutos e monitora o status code, você pode seguir os passos abaixo:\\n\\n1.
  **Configurar o Data Source**: Primeiro, você precisa ter um data source
  configurado no Grafana que possa realizar requisições HTTP. Uma opção comum é
  usar o Prometheus com o Blackbox Exporter, que é uma ferramenta que permite
  monitorar endpoints HTTP.\\n\\n2. **Configurar o Blackbox Exporter**:
  Configure o Blackbox Exporter para monitorar a rota HTTP desejada. No arquivo
  de configuração do Blackbox Exporter, adicione uma configuração para a sua
  rota:\\n\\n   ```yaml\\n   modules:\\n     http_2xx:\\n       prober:
  http\\n       timeout: 5s\\n       http:\\n         valid_http_versions: [
  \\\"HTTP/1.1\\\", \\\"HTTP/2\\\" ]\\n         valid_status_codes: []  # Se
  vazio, qualquer código 2xx é considerado válido\\n         method:
  GET\\n   ```\\n\\n3. **Configurar o Prometheus**: No arquivo de configuração
  do Prometheus, adicione o Blackbox Exporter como um
  target:\\n\\n   ```yaml\\n   scrape_configs:\\n     - job_name:
  'blackbox'\\n       metrics_path: /probe\\n       params:\\n         module:
  [http_2xx]  # Nome do módulo configurado no Blackbox
  Exporter\\n       static_configs:\\n         - targets:\\n           -
  http://sua-rota-http.com\\n       relabel_configs:\\n         - source_labels:
  [__address__]\\n           target_label: __param_target\\n         -
  source_labels: [__param_target]\\n           target_label:
  instance\\n         - target_label: __address__\\n           replacement:
